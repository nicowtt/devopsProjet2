<div class="card m-3">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h5 class="mb-0">Students
    </h5>
    <button class="btn btn-secondary btn-sm" (click)="logout()">Logout</button>
  </div>
  <div class="card-body">

    @if (isLoading) {
      <div class="text-center py-3">
        <mat-spinner diameter="40" color="primary"></mat-spinner>
      </div>
    }

    @if (errorMessage) {
      <div class="alert alert-danger">{{ errorMessage }}</div>
    }

    @if (!isLoading && !errorMessage) {
      @if (students.length === 0) {
        <p class="text-center text-muted">No students found.</p>
      } @else {
        <table mat-table [dataSource]="students" class="w-100">
          <ng-container matColumnDef="firstName">
            <th mat-header-cell *matHeaderCellDef>First Name</th>
            <td mat-cell *matCellDef="let student">{{ student.firstName }}</td>
          </ng-container>

          <ng-container matColumnDef="lastName">
            <th mat-header-cell *matHeaderCellDef>Last Name</th>
            <td mat-cell *matCellDef="let student">{{ student.lastName }}</td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>
              <button class="btn btn-success btn-sm" [routerLink]="['/student/create']">Add Student</button>
            </th>
            <td mat-cell *matCellDef="let student">
              <div style="display: flex; gap: 8px; justify-content: flex-end;">
                <button class="btn btn-primary btn-sm" [routerLink]="['/student', student.uuid]">Details</button>
                <button class="btn btn-danger btn-sm" (click)="removeStudent(student.uuid, student.firstName, student.lastName)">Remove</button>
              </div>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      }
    }

  </div>
</div>
